<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			rel="stylesheet"
			href="https://cdn.usebootstrap.com/bootstrap/4.3.1/css/bootstrap.min.css"
		/>
		<link rel="stylesheet" href="style.css" />
		<title>Ninja Weather</title>
	</head>
	<body>
		<div class="container my-5 mx-auto">
			<h1 class="text-mutted text-center my-4">Ninja Weather</h1>
			<form action="change-location my-4 text-center text-mutted">
				<label for="city">Enter a location for weather information</label>
				<input type="text" name="city" class="form-control p-4" />
			</form>
			<div class="card shadow-lg rounded mt-3 d-none">
				<img
					src="https://via.placeholder.com/400x300"
					class="time card-img-top"
					alt=""
				/>
				<div class="icon bg-light mx-auto text-center">
					<!-- icon -->
					<img src="" alt="">
				</div>
				<div class="text-mutted text-uppercase text-center details">
					<h5 class="my-3">City name</h5>
					<div class="my-3">Weather condition</div>
					<div class="display-4 my-4">
						<span>temp</span>
						<span>&deg;C</span>
					</div>
				</div>
			</div>
		</div>
		<script src="scripts/forecast.js"></script>
		<script src="scripts/app.js"></script>
	</body>
</html>
